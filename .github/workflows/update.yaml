name: Update

on:
  schedule:
    - cron: "0 3 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update
  cancel-in-progress: true

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          nix flake update --commit-lock-file --commit-lock-file-summary "flake: bump inputs"

          if git diff --quiet HEAD~1 HEAD; then
            echo "No input changes."
            exit 0
          fi

          # close any existing update/ PR
          gh pr list --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("update/")) | .number' \
          | while read -r num; do
            gh pr close "$num" --delete-branch || true
          done

          BRANCH="update/$(date +%Y-%m-%d)"
          git switch --force-create "$BRANCH"
          git push -f -u origin HEAD

          body=$(git log -1 --format='%b')
          gh pr create \
            --title "flake: bump inputs" \
            --body "$body" \
            --reviewer stepbrobd || true
