name: Bump

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump
  cancel-in-progress: true

jobs:
  Bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.TOKEN }}
          persist-credentials: true

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Dependencies
        run: nix profile add nixpkgs#nix-update

      - name: Bump
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -euo pipefail

          SYSTEM=$(nix eval --raw --impure --expr 'builtins.currentSystem')
          TODAY=$(date +%Y-%m-%d)
          BRANCH="bump/${TODAY}"
          git switch --force-create "$BRANCH"

          # discover package attrs under pkgs/: a directory with a default.nix is a
          # package (terminal); directories without one are scopes (e.g. ocamlPackages)
          # and are recursed into. helper subdirs inside a package are skipped
          discover_attrs() {
            local nix dir rel parent
            while IFS= read -r -d '' nix; do
              dir=$(dirname "$nix")
              rel=${dir#pkgs/}
              parent=$(dirname "$rel")
              local skip=false
              while [[ "$parent" != "." && "$parent" != "/" ]]; do
                if [[ -f "pkgs/${parent}/default.nix" ]]; then skip=true; break; fi
                parent=$(dirname "$parent")
              done
              $skip && continue
              printf '%s\n' "${rel//\//.}"
            done < <(find pkgs -mindepth 2 -name default.nix -print0) | sort -u
          }

          # opt-in gate: only packages with `passthru.autobump = true` are bumped
          # the attribute is absent by default, so anything not explicitly opted in
          # (overlay overrides, fork/asset pins, lockstep sets) is left untouched
          wants_bump() {
            local attr="$1" val
            val=$(nix eval --json ".#legacyPackages.${SYSTEM}.${attr}.autobump" 2>/dev/null) || return 1
            [[ "$val" == "true" ]]
          }

          update_package() {
            local attr="$1"
            local legacy_path="legacyPackages.${SYSTEM}.${attr}"

            local old_version
            old_version=$(nix eval --raw ".#${legacy_path}.version" 2>/dev/null) || {
              echo "::warning::Could not evaluate version for ${attr}, skipping."
              return 0
            }

            echo "::group::Updating ${attr} (current: ${old_version})"
            if ! nix-update --flake "$legacy_path"; then
              echo "::warning::nix-update failed for ${attr}"
              git checkout -- .
              git clean -fd
              echo "::endgroup::"
              return 0
            fi
            echo "::endgroup::"

            if git diff --quiet; then
              echo "${attr} is up to date."
              return 0
            fi

            local new_version
            new_version=$(nix eval --raw ".#${legacy_path}.version" 2>/dev/null) || new_version="unknown"

            git add -A
            git commit -m "pkgs/${attr//.//}: ${old_version} -> ${new_version}"
          }

          # update every opted-in package
          while IFS= read -r attr; do
            [[ -n "$attr" ]] || continue
            wants_bump "$attr" || continue
            update_package "$attr"
          done < <(discover_attrs)

          # create PR if there are updates
          if [[ $(git log origin/master..HEAD --oneline | wc -l) -eq 0 ]]; then
            echo "No packages updated."
            exit 0
          fi

          # close any existing bump/ PR
          gh pr list --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("bump/")) | .number' \
          | while read -r num; do
            gh pr close "$num" --delete-branch || true
          done

          git push -f -u origin HEAD

          body=$(git log origin/master..HEAD --format="- %s" | sort)
          gh pr create \
            --title "pkgs: bump ${TODAY}" \
            --body "$body" || true

          gh pr edit "$BRANCH" --add-reviewer stepbrobd 2>/dev/null || true
